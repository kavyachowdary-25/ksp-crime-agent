<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KSP Crime Intelligence — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --ink: #0e1420;
  --panel: #151d2c;
  --panel-2: #1a2436;
  --line: #26314a;
  --paper: #e9edf4;
  --dim: #8a97ad;
  --brass: #e8a33d;
  --red: #e4573d;
  --cyan: #5fb4c9;
  --font-display: "Barlow Condensed", sans-serif;
  --font-body: "IBM Plex Sans", sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
}
* { box-sizing: border-box; margin: 0; }
html, body { background: var(--ink); color: var(--paper); font-family: var(--font-body); font-size: 14px; }
a { color: var(--cyan); }

.wrap { max-width: 1400px; margin: 0 auto; padding: 0 20px 60px; }

nav.platform { display: flex; gap: 2px; padding-top: 14px; }
nav.platform a {
  font-family: var(--font-display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
  font-size: 13px; text-decoration: none; color: var(--dim); padding: 7px 16px;
  border: 1px solid var(--line); border-bottom: 0; background: var(--panel);
}
nav.platform a.here { color: var(--brass); background: var(--panel-2); }
nav.platform a:hover { color: var(--paper); }
header.top {
  display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  padding: 18px 0 14px; border-bottom: 1px solid var(--line);
}
.wordmark { font-family: var(--font-display); font-weight: 600; font-size: 26px; letter-spacing: 0.06em; text-transform: uppercase; }
.wordmark .sub { color: var(--brass); }
.nav { display: flex; gap: 2px; margin-left: auto; margin-right: 16px; }
.nav a {
  font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em; font-size: 14px;
  color: var(--dim); text-decoration: none; padding: 6px 14px; border: 1px solid var(--line);
}
.nav a.here { color: var(--ink); background: var(--brass); border-color: var(--brass); }
.nav a:not(.here):hover { color: var(--paper); }
.stamp { font-family: var(--font-mono); font-size: 12px; color: var(--dim); border: 1px solid var(--line); padding: 4px 10px; }
.stamp b { color: var(--paper); font-weight: 500; }

.controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding: 14px 0; }
.controls label { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em; font-size: 13px; color: var(--dim); }
select {
  background: var(--panel-2); color: var(--paper); border: 1px solid var(--line);
  font-family: var(--font-mono); font-size: 12px; padding: 6px 8px; min-width: 150px;
}
select:focus-visible, button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 1px; }
button.reset {
  background: none; border: 1px solid var(--line); color: var(--dim); font-family: var(--font-mono);
  font-size: 12px; padding: 6px 12px; cursor: pointer;
}
button.reset:hover { color: var(--paper); border-color: var(--dim); }

.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 20px; }
.kpi { background: var(--panel); padding: 14px 16px; }
.kpi .n { font-family: var(--font-mono); font-size: 26px; font-weight: 500; }
.kpi .l { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px; color: var(--dim); margin-top: 2px; }
.kpi.alert .n { color: var(--red); }

.grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
@media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }

.panel { background: var(--panel); border: 1px solid var(--line); }
.panel h2 {
  font-family: var(--font-display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
  font-size: 15px; padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center;
}
.panel h2 .meta { font-family: var(--font-mono); font-size: 11px; color: var(--dim); text-transform: none; letter-spacing: 0; }
.panel .body { padding: 16px; }

#map { height: 480px; }
.map-toggles { display: flex; gap: 6px; }
.map-toggles button {
  background: var(--panel-2); border: 1px solid var(--line); color: var(--dim);
  font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; cursor: pointer;
}
.map-toggles button.on { color: var(--ink); background: var(--brass); border-color: var(--brass); }

.spike-rail { display: flex; flex-direction: column; }
details.off { border-bottom: 1px solid var(--line); }
details.off:last-child { border-bottom: 0; }
details.off summary { list-style: none; cursor: pointer; padding: 10px 16px; display: flex; gap: 10px; align-items: baseline; }
details.off summary::-webkit-details-marker { display: none; }
details.off summary .nm { font-weight: 600; }
details.off summary .ct { font-family: var(--font-mono); font-size: 12px; color: var(--brass); }
details.off summary .xj {
  font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px;
  color: var(--red); border: 1px solid var(--red); padding: 1px 6px; margin-left: auto;
}
details.off summary .mo { font-size: 12px; color: var(--dim); }
.off-timeline { padding: 0 16px 12px; font-family: var(--font-mono); font-size: 11.5px; color: var(--dim); }
.off-timeline div { padding: 3px 0; border-top: 1px dashed var(--line); }
.off-timeline b { color: var(--paper); font-weight: 500; }
.spike { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; gap: 12px; align-items: flex-start; }
.spike:last-child { border-bottom: 0; }
.spike .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex: none; background: var(--dim); }
.spike.hot .dot { background: var(--red); animation: pulse 1.6s ease-out infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(228, 87, 61, 0.55); }
  100% { box-shadow: 0 0 0 12px rgba(228, 87, 61, 0); }
}
@media (prefers-reduced-motion: reduce) { .spike.hot .dot { animation: none; } }
.spike .where { font-weight: 600; }
.spike .what { color: var(--dim); font-size: 13px; }
.spike .nums { margin-left: auto; text-align: right; font-family: var(--font-mono); font-size: 12px; flex: none; }
.spike .z { color: var(--red); }
.spike.watch .z { color: var(--brass); }
.empty { padding: 20px 16px; color: var(--dim); font-size: 13px; }

.charts { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
@media (max-width: 980px) { .charts { grid-template-columns: 1fr; } }
.chart-box { position: relative; height: 260px; }

.matrix-wrap { overflow-x: auto; }
table.matrix { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 12px; }
table.matrix th {
  font-family: var(--font-display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  font-size: 12px; color: var(--dim); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line);
}
table.matrix th.b { text-align: center; }
table.matrix td { padding: 0; border: 1px solid var(--ink); }
table.matrix td.station { padding: 8px 10px; white-space: nowrap; background: var(--panel); border: 0; border-bottom: 1px solid var(--line); }
table.matrix td.station .d { color: var(--dim); font-size: 11px; }
.cell { display: block; text-align: center; padding: 10px 6px; color: var(--paper); }
.cell.flag { box-shadow: inset 0 0 0 2px var(--brass); }
.cell.flag2 { box-shadow: inset 0 0 0 2px var(--red); }
.legend { display: flex; gap: 16px; padding: 10px 16px; border-top: 1px solid var(--line); font-family: var(--font-mono); font-size: 11px; color: var(--dim); flex-wrap: wrap; }
.legend .sw { display: inline-block; width: 12px; height: 12px; vertical-align: -2px; margin-right: 6px; }

.risk-row { display: grid; grid-template-columns: 44px 1fr auto; gap: 12px; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--line); }
.risk-row:last-child { border-bottom: 0; }
.risk-score { font-family: var(--font-mono); font-size: 16px; font-weight: 500; text-align: center; padding: 6px 0; }
.risk-score.hi { color: var(--red); box-shadow: inset 0 0 0 1px var(--red); }
.risk-score.med { color: var(--brass); box-shadow: inset 0 0 0 1px var(--brass); }
.risk-score.lo { color: var(--dim); box-shadow: inset 0 0 0 1px var(--line); }
.risk-row .who { min-width: 0; }
.risk-row .who .d { color: var(--dim); font-size: 12px; }
.risk-row .fc { font-family: var(--font-mono); font-size: 12px; text-align: right; color: var(--dim); }
.risk-row .fc b { color: var(--paper); font-weight: 500; }
.anom { padding: 12px 16px; border-bottom: 1px solid var(--line); }
.anom:last-child { border-bottom: 0; }
.anom .head { display: flex; justify-content: space-between; gap: 10px; font-family: var(--font-mono); font-size: 12px; }
.anom .head .no { color: var(--cyan); text-decoration: none; }
.anom .head .no:hover { text-decoration: underline; }
.anom .head .sc { color: var(--brass); }
.anom .what { font-size: 13px; margin: 3px 0 5px; }
.anom .why { color: var(--dim); font-size: 12px; line-height: 1.5; }
.anom .why span::before { content: "\2192  "; color: var(--brass); }
.anom .why span { display: block; }

.off { border-bottom: 1px solid var(--line); }
.off:last-child { border-bottom: 0; }
.off summary { list-style: none; cursor: pointer; padding: 12px 16px; display: grid;
  grid-template-columns: minmax(0, 1fr) auto; gap: 6px 12px; align-items: baseline; }
.off summary::-webkit-details-marker { display: none; }
.off summary:hover { background: var(--panel-2); }
.off .who { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.off .who .pid { font-family: var(--font-mono); font-size: 11px; color: var(--dim); font-weight: 400; }
.off .stats { font-family: var(--font-mono); font-size: 12px; text-align: right; color: var(--dim); white-space: nowrap; }
.off .stats b { color: var(--paper); font-weight: 500; }
.off .tags { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; border: 1px solid var(--line); color: var(--dim); }
.tag.xj { color: var(--red); border-color: var(--red); }
.tag.mo { color: var(--brass); border-color: var(--brass); }
.off .timeline { padding: 0 16px 12px; }
.off .timeline .tl-row { display: grid; grid-template-columns: 90px 1fr auto; gap: 10px;
  font-family: var(--font-mono); font-size: 12px; padding: 5px 0; border-top: 1px dashed var(--line); }
.off .timeline .tl-row .st { color: var(--dim); }
.socio-corr { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border-bottom: 1px solid var(--line); }
.socio-corr .c { background: var(--panel); padding: 12px; text-align: center; }
.socio-corr .c .v { font-family: var(--font-mono); font-size: 20px; }
.socio-corr .c .l { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; color: var(--dim); margin-top: 2px; }
table.socio { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
table.socio th { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px;
  color: var(--dim); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line); }
table.socio td { padding: 7px 12px; border-bottom: 1px solid var(--line); }
table.socio tr:last-child td { border-bottom: 0; }
table.socio .num { text-align: right; }
.ratebar { display: inline-block; height: 8px; background: var(--cyan); vertical-align: middle; margin-right: 6px; }
.caveat { padding: 10px 16px; border-top: 1px solid var(--line); color: var(--dim); font-size: 11px; font-family: var(--font-mono); }

.loading, .error-banner { padding: 40px; text-align: center; color: var(--dim); font-family: var(--font-mono); }
.error-banner { color: var(--red); }
.maplibregl-popup-content { background: var(--panel-2); color: var(--paper); font-family: var(--font-mono); font-size: 12px; border: 1px solid var(--line); border-radius: 0; }
.maplibregl-popup-tip { border-top-color: var(--panel-2) !important; }
</style>
</head>
<body>
<div class="wrap">
  <nav class="platform">
    <a href="/app/index.html">Conversational Intelligence</a>
    <a href="/app/analytics.html" class="here" aria-current="page">Crime Analytics</a>
  </nav>
  <header class="top">
    <div class="wordmark">KSP <span class="sub">Crime Intelligence</span></div>
    <nav class="nav">
      <a href="/app/index.html">Agent Console</a>
      <a class="here" href="/app/analytics.html">Analytics</a>
    </nav>
    <div class="stamp" id="stamp">DATA HORIZON — LOADING</div>
  </header>

  <div class="controls">
    <label for="f-district">District</label>
    <select id="f-district"><option value="">All districts</option></select>
    <label for="f-head">Crime head</label>
    <select id="f-head"><option value="">All crime heads</option></select>
    <button class="reset" id="f-reset">Clear filters</button>
  </div>

  <div id="app">
    <div class="loading">LOADING CRIME RECORDS…</div>
  </div>
</div>

<script>
(function () {
  "use strict";
  const API = "/server/analytics";
  const state = { district: "", majorHead: "", summary: null, map: null, mapMode: "stations", charts: {} };

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const fmt = (n) => Number(n).toLocaleString("en-IN");

  function qs(extra) {
    const p = new URLSearchParams();
    if (state.district) p.set("district", state.district);
    if (state.majorHead) p.set("majorHead", state.majorHead);
    for (const k in extra || {}) p.set(k, extra[k]);
    const s = p.toString();
    return s ? "?" + s : "";
  }

  async function get(path) {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(path + " → HTTP " + r.status);
    return r.json();
  }

  // ---------- layout ----------
  function renderShell() {
    $("app").innerHTML = `
      <div class="kpis" id="kpis"></div>
      <div class="grid">
        <div class="panel">
          <h2>District &amp; Station Map
            <span class="map-toggles">
              <button id="m-stations" class="on">Stations</button>
              <button id="m-heat">Heatmap</button>
              <button id="m-night">Night only</button>
            </span>
          </h2>
          <div id="map"></div>
          <div class="legend">
            <span><span class="sw" style="background:var(--brass)"></span>circle area = case volume</span>
            <span><span class="sw" style="background:var(--red)"></span>heat = incident density</span>
            <span>click a station to drill down</span>
          </div>
        </div>
        <div class="panel">
          <h2>Emerging Trend Alerts <span class="meta" id="spike-meta"></span></h2>
          <div class="spike-rail" id="spikes"></div>
        </div>
      </div>
      <div class="charts">
        <div class="panel">
          <h2>Monthly Case Volume <span class="meta" id="ts-meta"></span></h2>
          <div class="body chart-box"><canvas id="c-timeseries"></canvas></div>
        </div>
        <div class="panel">
          <h2>By Crime Head</h2>
          <div class="body chart-box"><canvas id="c-categories"></canvas></div>
        </div>
      </div>
      <div class="charts">
        <div class="panel">
          <h2>Predictive Risk <span class="meta" id="risk-meta"></span></h2>
          <div class="spike-rail" id="risk"></div>
        </div>
        <div class="panel">
          <h2>Anomalous Incidents <span class="meta">rarity-scored</span></h2>
          <div class="spike-rail" id="anomalies"></div>
        </div>
      </div>
      <div class="charts">
        <div class="panel">
          <h2>Repeat Offenders <span class="meta" id="off-meta"></span></h2>
          <div id="offenders"></div>
        </div>
        <div class="panel">
          <h2>Socio-Economic Overlay <span class="meta">Census 2011</span></h2>
          <div class="socio-corr" id="socio-corr"></div>
          <div class="matrix-wrap"><table class="socio" id="socio-table"></table></div>
          <div class="caveat" id="socio-caveat"></div>
        </div>
      </div>
      <div class="panel" style="margin-top:20px">
        <h2>Spatiotemporal Hotspots <span class="meta">station × time of day, z-score of incidents/hour</span></h2>
        <div class="matrix-wrap" id="matrix"></div>
        <div class="legend">
          <span><span class="sw" style="box-shadow: inset 0 0 0 2px var(--brass)"></span>z ≥ 1.5 elevated</span>
          <span><span class="sw" style="box-shadow: inset 0 0 0 2px var(--red)"></span>z ≥ 2.0 hotspot</span>
          <span>cell shade = incident rate vs statewide mean</span>
        </div>
      </div>`;
    $("m-stations").onclick = () => setMapMode("stations");
    $("m-heat").onclick = () => setMapMode("heat");
    $("m-night").onclick = () => setMapMode("night");
  }

  // ---------- KPIs ----------
  function renderKpis(summary, spikes) {
    const flagged = spikes.spikes.length;
    $("kpis").innerHTML = `
      <div class="kpi"><div class="n">${fmt(summary.totalCases)}</div><div class="l">Cases on record</div></div>
      <div class="kpi"><div class="n">${summary.districts.length}</div><div class="l">Districts</div></div>
      <div class="kpi"><div class="n" id="kpi-stations">—</div><div class="l">Police stations</div></div>
      <div class="kpi ${flagged ? "alert" : ""}"><div class="n">${flagged}</div><div class="l">Active spike alerts</div></div>`;
  }

  // ---------- map ----------
  function initMap() {
    state.map = new maplibregl.Map({
      container: "map",
      style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
      center: [76.5, 14.6],
      zoom: 6,
      attributionControl: true
    });
    state.map.addControl(new maplibregl.NavigationControl({ showCompass: false }));
    return new Promise((res) => state.map.on("load", res));
  }

  function stationsToGeoJSON(stations) {
    return {
      type: "FeatureCollection",
      features: stations.filter((s) => s.centroid).map((s) => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [s.centroid.lng, s.centroid.lat] },
        properties: { station: s.station, district: s.district, count: s.count,
          top: (s.topMajorHeads[0] || {}).majorHead || "—" }
      }))
    };
  }

  function heatToGeoJSON(points) {
    return {
      type: "FeatureCollection",
      features: points.map((p) => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [p[1], p[0]] }, // API sends [lat,lng]
        properties: {}
      }))
    };
  }

  async function refreshMap() {
    const [st, heat, night] = await Promise.all([
      get("/by-station" + qs()),
      get("/heatmap" + qs()),
      get("/heatmap" + qs({ hourFrom: 22, hourTo: 5 }))
    ]);
    $("kpi-stations") && ($("kpi-stations").textContent = st.stations.length);

    const map = state.map;
    const sets = {
      stations: stationsToGeoJSON(st.stations),
      heat: heatToGeoJSON(heat.points),
      night: heatToGeoJSON(night.points)
    };
    for (const id of ["stations", "heat", "night"]) {
      if (map.getSource("src-" + id)) map.getSource("src-" + id).setData(sets[id]);
      else map.addSource("src-" + id, { type: "geojson", data: sets[id] });
    }
    if (!map.getLayer("lyr-stations")) {
      map.addLayer({
        id: "lyr-stations", type: "circle", source: "src-stations",
        paint: {
          "circle-radius": ["*", 0.9, ["sqrt", ["get", "count"]]],
          "circle-color": "#e8a33d", "circle-opacity": 0.55,
          "circle-stroke-color": "#e8a33d", "circle-stroke-width": 1.5
        }
      });
      for (const hid of ["heat", "night"]) {
        map.addLayer({
          id: "lyr-" + hid, type: "heatmap", source: "src-" + hid,
          layout: { visibility: "none" },
          paint: {
            "heatmap-radius": 22, "heatmap-intensity": 0.9,
            "heatmap-color": ["interpolate", ["linear"], ["heatmap-density"],
              0, "rgba(0,0,0,0)", 0.3, "#3b4b6b", 0.6, "#e8a33d", 1, "#e4573d"]
          }
        });
      }
      map.on("click", "lyr-stations", (e) => {
        const p = e.features[0].properties;
        new maplibregl.Popup().setLngLat(e.lngLat)
          .setHTML(`<b>${esc(p.station)}</b><br>${esc(p.district)}<br>${fmt(p.count)} cases · top: ${esc(p.top)}`)
          .addTo(map);
      });
      map.on("mouseenter", "lyr-stations", () => (map.getCanvas().style.cursor = "pointer"));
      map.on("mouseleave", "lyr-stations", () => (map.getCanvas().style.cursor = ""));
    }
    setMapMode(state.mapMode);
  }

  function setMapMode(mode) {
    state.mapMode = mode;
    const vis = { stations: mode === "stations", heat: mode === "heat", night: mode === "night" };
    for (const id in vis) {
      if (state.map.getLayer("lyr-" + id))
        state.map.setLayoutProperty("lyr-" + id, "visibility", vis[id] ? "visible" : "none");
      const btn = $("m-" + (id === "night" ? "night" : id === "heat" ? "heat" : "stations"));
      btn.classList.toggle("on", vis[id]);
    }
  }

  // ---------- spikes ----------
  function renderSpikes(sp) {
    $("spike-meta").textContent = "90d window · as of " + sp.anchor;
    const rail = $("spikes");
    const hot = sp.spikes;
    const rows = hot.length ? hot : (sp.all || []).slice(0, 6);
    if (!rows.length) { rail.innerHTML = '<div class="empty">No trend data for this filter.</div>'; return; }
    rail.innerHTML =
      (hot.length ? "" : '<div class="empty">No spikes above 2σ. Watchlist — highest deviations:</div>') +
      rows.map((s) => `
        <div class="spike ${hot.length ? "hot" : "watch"}">
          <span class="dot"></span>
          <div>
            <div class="where">${esc(s.district)}</div>
            <div class="what">${esc(s.majorHead)}</div>
          </div>
          <div class="nums">
            <div class="z">z ${s.zScore.toFixed(1)}</div>
            <div>${s.currentWindow} vs μ${s.baselineMean}</div>
            ${s.pctChange != null ? `<div>${s.pctChange > 0 ? "+" : ""}${s.pctChange}%</div>` : ""}
          </div>
        </div>`).join("");
  }

  // ---------- charts ----------
  const chartDefaults = {
    color: "#8a97ad",
    borderColor: "#26314a",
    font: { family: "'IBM Plex Mono', monospace", size: 11 }
  };
  Chart.defaults.color = chartDefaults.color;
  Chart.defaults.borderColor = chartDefaults.borderColor;
  Chart.defaults.font = chartDefaults.font;

  function renderTimeseries(ts) {
    $("ts-meta").textContent = state.district || "statewide";
    const ctx = $("c-timeseries");
    if (state.charts.ts) state.charts.ts.destroy();
    state.charts.ts = new Chart(ctx, {
      type: "line",
      data: {
        labels: ts.series.map((p) => p.period),
        datasets: [{ data: ts.series.map((p) => p.count), borderColor: "#5fb4c9",
          backgroundColor: "rgba(95,180,201,0.12)", fill: true, pointRadius: 0, borderWidth: 1.5, tension: 0.25 }]
      },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { ticks: { maxTicksLimit: 12 }, grid: { display: false } }, y: { beginAtZero: true } } }
    });
  }

  function renderCategories(byDistrict) {
    const counts = new Map();
    for (const d of byDistrict.districts)
      for (const c of d.topMajorHeads) counts.set(c.majorHead, (counts.get(c.majorHead) || 0) + c.count);
    const rows = [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8);
    const ctx = $("c-categories");
    if (state.charts.cat) state.charts.cat.destroy();
    state.charts.cat = new Chart(ctx, {
      type: "bar",
      data: { labels: rows.map((r) => r[0]),
        datasets: [{ data: rows.map((r) => r[1]), backgroundColor: "#e8a33d", borderWidth: 0, barThickness: 14 }] },
      options: { indexAxis: "y", responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true }, y: { grid: { display: false } } } }
    });
  }

  // ---------- hotspot matrix ----------
  const BUCKETS = ["night", "morning", "afternoon", "evening"];
  function renderMatrix(hs) {
    const byStation = new Map();
    let maxRate = 0;
    for (const c of hs.cells) {
      if (!byStation.has(c.station)) byStation.set(c.station, { district: c.district, cells: {} });
      byStation.get(c.station).cells[c.bucket] = c;
      maxRate = Math.max(maxRate, c.count);
    }
    const stations = [...byStation.entries()].sort((a, b) => {
      const za = Math.max(...Object.values(a[1].cells).map((c) => c.zScore));
      const zb = Math.max(...Object.values(b[1].cells).map((c) => c.zScore));
      return zb - za;
    });
    $("matrix").innerHTML = `
      <table class="matrix">
        <thead><tr><th>Station</th>${BUCKETS.map((b) => `<th class="b">${b}</th>`).join("")}</tr></thead>
        <tbody>
          ${stations.map(([name, s]) => `
            <tr>
              <td class="station">${esc(name)}<br><span class="d">${esc(s.district)}</span></td>
              ${BUCKETS.map((b) => {
                const c = s.cells[b];
                if (!c) return '<td><span class="cell">·</span></td>';
                const alpha = Math.min(0.85, 0.08 + (c.count / maxRate) * 0.7);
                const cls = c.zScore >= 2 ? "cell flag2" : c.zScore >= 1.5 ? "cell flag" : "cell";
                return `<td><span class="${cls}" style="background:rgba(232,163,61,${alpha.toFixed(2)})"
                  title="z ${c.zScore}">${c.count}</span></td>`;
              }).join("")}
            </tr>`).join("")}
        </tbody>
      </table>`;
  }

  // ---------- risk ----------
  function renderRisk(rk) {
    $("risk-meta").textContent = "3-month forecast \u00b7 as of " + rk.anchor;
    const rows = rk.stations.slice(0, 8);
    if (!rows.length) { $("risk").innerHTML = '<div class="empty">No stations match this filter.</div>'; return; }
    $("risk").innerHTML = rows.map((s) => {
      const cls = s.riskScore >= 70 ? "hi" : s.riskScore >= 45 ? "med" : "lo";
      const drv = [];
      if (s.drivers.volume >= 0.6) drv.push("high volume");
      if (s.drivers.trend >= 0.6) drv.push("rising trend");
      if (s.drivers.heinous >= 0.6) drv.push("heinous share");
      return `
      <div class="risk-row">
        <div class="risk-score ${cls}">${s.riskScore}</div>
        <div class="who"><div>${esc(s.station)}</div>
          <div class="d">${esc(s.district)}${drv.length ? " \u00b7 " + drv.join(", ") : ""}</div></div>
        <div class="fc">next 3 mo<br><b>${s.forecastNext3Months.join(" \u00b7 ")}</b></div>
      </div>`;
    }).join("");
  }

  // ---------- anomalies ----------
  function renderAnomalies(an) {
    const rows = an.anomalies;
    if (!rows.length) { $("anomalies").innerHTML = '<div class="empty">No incidents deviate from learned patterns under this filter.</div>'; return; }
    $("anomalies").innerHTML = rows.slice(0, 8).map((a) => `
      <div class="anom">
        <div class="head"><a class="no" href="/app/index.html?ask=${encodeURIComponent("Give me full details of case " + a.crimeNo + " and why it might be unusual")}">${esc(a.crimeNo)}</a><span class="sc">score ${a.score}</span></div>
        <div class="what">${esc(a.majorHead)} \u00b7 ${esc(a.station)} \u00b7 ${esc(a.incidentAt)}</div>
        <div class="why">${a.reasons.map((r) => `<span>${esc(r)}</span>`).join("")}</div>
      </div>`).join("");
  }

  // ---------- socio ----------
// ---------- repeat offenders ----------
  function renderOffenders(off) {
    $("off-meta").textContent = fmt(off.totalRepeatOffenders) + " repeat \u00b7 " + fmt(off.crossJurisdictionCount) + " cross-jurisdiction";
    const rows = off.offenders.slice(0, 8);
    if (!rows.length) { $("offenders").innerHTML = '<div class="empty">No linked repeat offenders found.</div>'; return; }
    $("offenders").innerHTML = rows.map((o) => `
      <details class="off">
        <summary>
          <span class="who">${esc(o.name)} <span class="pid">${esc(o.personId)}</span></span>
          <span class="stats"><b>${o.caseCount}</b> cases \u00b7 <b>${o.districts.length}</b> district${o.districts.length > 1 ? "s" : ""}</span>
          <span class="tags">
            ${o.crossJurisdiction ? '<span class="tag xj">cross-jurisdiction</span>' : ""}
            ${o.moBreakdown.slice(0, 3).map((m) => `<span class="tag mo">${esc(m.majorHead)} \u00d7${m.count}</span>`).join("")}
          </span>
        </summary>
        <div class="timeline">
          ${o.timeline.slice(0, 6).map((t) => `
            <div class="tl-row">
              <span>${esc(t.date)}</span>
              <span><a class="no" href="/app/index.html?q=${encodeURIComponent("Tell me about case " + t.crimeNo)}">${esc(t.crimeNo)}</a> \u00b7 ${esc(t.station)} \u00b7 ${esc(t.majorHead)}</span>
              <span class="st">${esc(t.status)}</span>
            </div>`).join("")}
        </div>
      </details>`).join("");
  }

  // ---------- socio overlay ----------
  function corrColor(r) { return r == null ? "var(--dim)" : Math.abs(r) >= 0.5 ? "var(--brass)" : "var(--dim)"; }
  function renderSocio(so) {
    const c = so.correlations;
    $("socio-corr").innerHTML = [
      ["urbanizationVsCrimeRate", "Urbanization"],
      ["densityVsCrimeRate", "Density"],
      ["literacyVsCrimeRate", "Literacy"]
    ].map(([k, l]) => `<div class="c"><div class="v" style="color:${corrColor(c[k])}">${c[k] == null ? "\u2014" : "r " + c[k].toFixed(2)}</div><div class="l">${l} vs rate</div></div>`).join("");
    const maxRate = Math.max(...so.units.map((u) => u.casesPerLakh), 1);
    $("socio-table").innerHTML = `
      <thead><tr><th>Unit</th><th class="num">Cases / lakh</th><th class="num">Urban %</th><th class="num">Literacy %</th></tr></thead>
      <tbody>${so.units.slice().sort((a, b) => b.casesPerLakh - a.casesPerLakh).map((u) => `
        <tr><td>${esc(u.policeUnit)}</td>
        <td class="num"><span class="ratebar" style="width:${Math.round((u.casesPerLakh / maxRate) * 60)}px"></span>${u.casesPerLakh}</td>
        <td class="num">${u.urbanPct}</td><td class="num">${u.literacyPct}</td></tr>`).join("")}
      </tbody>`;
    $("socio-caveat").textContent = so.caveat;
  }

  // ---------- filters ----------
  function populateFilters(summary) {
    $("f-district").innerHTML = '<option value="">All districts</option>' +
      summary.districts.map((d) => `<option>${esc(d.district)}</option>`).join("");
    $("f-head").innerHTML = '<option value="">All crime heads</option>' +
      summary.majorHeads.map((c) => `<option>${esc(c.majorHead)}</option>`).join("");
    $("f-district").onchange = (e) => { state.district = e.target.value; refresh(); };
    $("f-head").onchange = (e) => { state.majorHead = e.target.value; refresh(); };
    $("f-reset").onclick = () => {
      state.district = state.majorHead = "";
      $("f-district").value = $("f-head").value = "";
      refresh();
    };
  }

  async function refresh() {
    const [ts, bd, hs, sp, rk, an, so, off] = await Promise.all([
      get("/timeseries" + qs({ granularity: "month" })),
      get("/by-district" + qs()),
      get("/hotspots" + qs()),
      get("/spikes"),
      get("/risk" + qs()),
      get("/anomalies" + qs({ limit: 8 })),
      get("/socio" + (state.majorHead ? "?majorHead=" + encodeURIComponent(state.majorHead) : "")),
      get("/offenders?limit=25")
    ]);
    renderTimeseries(ts);
    renderCategories(bd);
    renderMatrix(hs);
    renderSpikes(sp);
    renderRisk(rk);
    renderAnomalies(an);
    renderOffenders(off);
    renderSocio(so);
    await refreshMap();
  }

  // ---------- boot ----------
  (async function boot() {
    try {
      const [summary, spikes] = await Promise.all([get("/summary"), get("/spikes")]);
      state.summary = summary;
      $("stamp").innerHTML = `DATA HORIZON <b>${summary.horizon.from}</b> — <b>${summary.horizon.to}</b> · ${fmt(summary.totalCases)} RECORDS`;
      renderShell();
      renderKpis(summary, spikes);
      populateFilters(summary);
      await initMap();
      await refresh();
    } catch (err) {
      $("app").innerHTML = `<div class="error-banner">Could not reach the analytics service.<br>${esc(err.message)}<br><br>Check that /server/analytics/health responds.</div>`;
      console.error(err);
    }
  })();
})();
</script>
</body>
</html>
